name: Build and Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore StArray.Agents.Functions.slnx

      - name: Build
        run: dotnet build StArray.Agents.Functions/StArray.Agents.Functions.csproj --configuration Release --no-restore

      - name: Pack
        run:
            mkdir -p ./artifacts && dotnet pack StArray.Agents.Functions/StArray.Agents.Functions.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
